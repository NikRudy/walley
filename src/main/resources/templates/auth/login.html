<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Walley</title>
</head>
<body>
<h1>Вход</h1>

<div th:if="${param.error}">
    <p style="color:red;">Неверный логин или пароль.</p>
</div>
<div th:if="${param.logout}">
    <p style="color:green;">Вы успешно вышли из системы.</p>
</div>
<div th:if="${param.registered}">
    <p style="color:green;">Регистрация успешна, войдите под своими данными.</p>
</div>

<form th:action="@{/login}" method="post">
    <!-- CSRF-токен -->
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <label>
        Логин или email:
        <input type="text" name="username"/>
    </label>
    <br/>

    <label>
        Пароль:
        <input type="password" name="password"/>
    </label>
    <br/>

    <button type="submit">Войти</button>
</form>

</body>
</html>
