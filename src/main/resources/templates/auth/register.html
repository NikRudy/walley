<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::section}, 'Register')}">

<section>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>Register</h2>

            <form th:action="@{/register}" th:object="${form}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input id="username" type="text" class="form-control" th:field="*{username}"/>
                    <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input id="email" type="email" class="form-control" th:field="*{email}"/>
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" type="password" class="form-control" th:field="*{password}"/>
                    <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm password</label>
                    <input id="confirmPassword" type="password" class="form-control" th:field="*{confirmPassword}"/>
                    <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>

                <div class="text-danger" th:if="${#fields.hasGlobalErrors()}" th:errors="*{_global}"></div>

                <button type="submit" class="btn btn-primary">Create account</button>
                <a th:href="@{/login}" class="btn btn-link">Already registered?</a>
            </form>
        </div>
    </div>
</section>

</html>
