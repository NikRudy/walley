<!-- templates/user/profile.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Profile</title>
</head>
<body>
<div th:replace="layout/main :: content">
    <h2>User profile</h2>


    <form th:action="@{/profile}" th:object="${profile}" method="post" class="mt-3">
        <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input id="username" type="text" class="form-control" th:field="*{username}"/>
            <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>


        <div class="mb-3">
            <label class="form-label" for="email">E-mail</label>
            <input id="email" type="email" class="form-control" th:field="*{email}"/>
            <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>


        <div class="mb-3">
            <label class="form-label">Roles</label>
            <span class="badge bg-secondary me-1" th:each="role : *{roles}" th:text="${role}"></span>
        </div>


        <div class="mb-3">
            <label class="form-label">Status</label>
            <span th:if="${profile.enabled}" class="badge bg-success">Enabled</span>
            <span th:unless="${profile.enabled}" class="badge bg-danger">Disabled</span>
        </div>


        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/profile/password}" class="btn btn-link">Change password</a>
    </form>
</div>
</body>
</html>
