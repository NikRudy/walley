<!-- templates/user/change-password.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Change password</title>
</head>
<body>
<div th:replace="layout/main :: content">
    <h2>Change password</h2>


    <form th:action="@{/profile/password}" th:object="${passwordForm}" method="post" class="mt-3">
        <div class="mb-3">
            <label class="form-label" for="currentPassword">Current password</label>
            <input id="currentPassword" type="password" class="form-control" th:field="*{currentPassword}"/>
            <div class="text-danger" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
        </div>


        <div class="mb-3">
            <label class="form-label" for="newPassword">New password</label>
            <input id="newPassword" type="password" class="form-control" th:field="*{newPassword}"/>
            <div class="text-danger" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>


        <div class="mb-3">
            <label class="form-label" for="confirmNewPassword">Confirm new password</label>
            <input id="confirmNewPassword" type="password" class="form-control" th:field="*{confirmNewPassword}"/>
            <div class="text-danger" th:if="${#fields.hasErrors('confirmNewPassword')}" th:errors="*{confirmNewPassword}"></div>
        </div>


        <button type="submit" class="btn btn-primary">Update password</button>
        <a th:href="@{/profile}" class="btn btn-secondary">Back to profile</a>
    </form>
</div>
</body>
</html>
