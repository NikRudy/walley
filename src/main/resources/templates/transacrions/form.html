<!-- templates/transactions/form.html -->
<div class="mb-3">
    <label class="form-label" for="occurredAt">Date and time</label>
    <input id="occurredAt" type="datetime-local" class="form-control"
           th:value="${#temporals.format(*{occurredAt}, 'yyyy-MM-dd''T''HH:mm')}" name="occurredAt"/>
    <div class="text-danger" th:if="${#fields.hasErrors('occurredAt')}" th:errors="*{occurredAt}"></div>
</div>


<div class="mb-3">
    <label class="form-label" for="accountId">Account</label>
    <select id="accountId" class="form-select" th:field="*{accountId}">
        <option th:value="" disabled>Choose account</option>
        <option th:each="acc : ${accounts}" th:value="${acc.id}" th:text="${acc.name}"></option>
    </select>
    <div class="text-danger" th:if="${#fields.hasErrors('accountId')}" th:errors="*{accountId}"></div>
</div>


<div class="mb-3">
    <label class="form-label" for="type">Type</label>
    <select id="type" class="form-select" th:field="*{type}">
        <option th:value="" disabled>Choose type</option>
        <option value="INCOME">Income</option>
        <option value="EXPENSE">Expense</option>
    </select>
    <div class="text-danger" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
</div>


<div class="mb-3">
    <label class="form-label" for="categoryId">Category</label>
    <select id="categoryId" class="form-select" th:field="*{categoryId}">
        <option th:value="" disabled>Choose category</option>
        <optgroup label="Income">
            <option th:each="c : ${incomeCategories}" th:value="${c.id}" th:text="${c.name}"></option>
        </optgroup>
        <optgroup label="Expense">
            <option th:each="c : ${expenseCategories}" th:value="${c.id}" th:text="${c.name}"></option>
        </optgroup>
    </select>
    <div class="text-danger" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
</div>


<div class="mb-3">
    <label class="form-label" for="subcategoryId">Subcategory</label>
    <select id="subcategoryId" class="form-select" th:field="*{subcategoryId}">
        <option th:value="" disabled>Choose subcategory</option>
        <option th:each="s : ${subcategories}" th:value="${s.id}" th:text="${s.name}"></option>
    </select>
</div>


<div class="mb-3">
    <label class="form-label" for="amount">Amount</label>
    <input id="amount" type="number" step="0.01" class="form-control" th:field="*{amount}"/>
    <div class="text-danger" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
</div>


<div class="mb-3">
    <label class="form-label" for="description">Description</label>
    <textarea id="description" class="form-control" rows="3" th:field="*{description}"></textarea>
</div>


<button type="submit" class="btn btn-primary">Save</button>
<a th:href="@{/transactions}" class="btn btn-secondary">Cancel</a>
</form>
</div>
</body>
</html>
