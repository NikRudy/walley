<!-- templates/accounts/form.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Account</title>
</head>
<body>
<div th:replace="layout/main :: content">
    <h2 th:text="${account.id == null} ? 'New account' : 'Edit account'"></h2>


    <form th:action="${account.id == null} ? @{/accounts} : @{'/accounts/' + ${account.id}}"
          th:object="${account}" method="post" class="mt-3">


        <div class="mb-3">
            <label class="form-label" for="name">Name</label>
            <input id="name" type="text" class="form-control" th:field="*{name}"/>
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>


        <div class="mb-3">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" class="form-control" rows="3" th:field="*{description}"></textarea>
        </div>


        <div class="mb-3">
            <label class="form-label" for="currentBalance">Current balance</label>
            <input id="currentBalance" type="number" step="0.01" class="form-control" th:field="*{currentBalance}"/>
            <div class="text-danger" th:if="${#fields.hasErrors('currentBalance')}" th:errors="*{currentBalance}"></div>
        </div>


        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/accounts}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
